name: OpenSSF Scorecard

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'  # Monday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.0  # v4.1.4
      with:
        persist-credentials: false

    - name: Run analysis
      uses: ossf/scorecard-action@v2.3.3  # v2.3.3
      with:
        results_file: results.sarif
        results_format: sarif

    - name: Upload SARIF file to GitHub
      uses: github/codeql-action/upload-sarif@v3.25.8  # v3.25.8
      with:
        sarif_file: results.sarif
